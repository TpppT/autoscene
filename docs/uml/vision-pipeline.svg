ngth="105.8477" x="2513" y="748.6426">TextLocateStage</text></g><!--entity ReaderClassificationStage--><g class="entity" data-qualified-name="Available Stage Types.ReaderClassificationStage" data-source-line="69" id="ent0054"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="184.9785" x="2473.5" y="797.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="164.9785" x="2483.5" y="821.6426">ReaderClassificationStage</text></g><!--entity NodeFilterStage--><g class="entity" data-qualified-name="Available Stage Types.NodeFilterStage" data-source-line="70" id="ent0055"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="121.165" x="2505.5" y="870.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="101.165" x="2515.5" y="894.6426">NodeFilterStage</text></g><!--entity ComparatorFilterStage--><g class="entity" data-qualified-name="Available Stage Types.ComparatorFilterStage" data-source-line="71" id="ent0056"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="161.6133" x="2485" y="943.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="141.6133" x="2495" y="967.6426">ComparatorFilterStage</text></g><!--entity OperatorStage--><g class="entity" data-qualified-name="Available Stage Types.OperatorStage" data-source-line="72" id="ent0057"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="111.834" x="2510" y="1016.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="91.834" x="2520" y="1040.6426">OperatorStage</text></g><!--entity ActionVisionRuntime--><g class="entity" data-qualified-name="ActionVisionRuntime" data-source-line="8" id="ent0002"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="149.1719" x="379.5" y="680.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="129.1719" x="389.5" y="704.6426">ActionVisionRuntime</text></g><!--entity ReaderUIChecks--><g class="entity" data-qualified-name="ReaderUIChecks" data-source-line="9" id="ent0003"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="126.5996" x="390.5" y="753.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.5996" x="400.5" y="777.6426">ReaderUIChecks</text></g><g class="entity" data-qualified-name="GMN67" data-source-line="86" id="ent0068"><path d="M2057,548.1094 L2057,672.5703 A0,0 0 0 0 2057,672.5703 L2228.5,672.5703 L2232.5,723.8894 L2236.5,672.5703 L2407.5259,672.5703 A0,0 0 0 0 2407.5259,672.5703 L2407.5259,558.1094 L2397.5259,548.1094 L2057,548.1094 A0,0 0 0 0 2057,548.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2397.5259,548.1094 L2397.5259,558.1094 L2407.5259,558.1094 L2397.5259,548.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="329.5259" x="2063" y="566.6045">A concrete pipeline selects any ordered subset of stages.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="2063" y="582.9561">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.4854" x="2063" y="599.3076">Common built-in flows:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.8843" x="2063" y="615.6592">- run_object_locate_pipeline():</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.3833" x="2070.2236" y="632.0107">DetectorRegionStage -&gt; NodeFilterStage</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.1479" x="2063" y="648.3623">- run_text_locate_pipeline():</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.7896" x="2070.2236" y="664.7139">TextLocateStage with an optional seed region</text></g><g class="entity" data-qualified-name="GMN70" data-source-line="96" id="ent0071"><path d="M2142,437.6094 L2142,513.0156 L2323.4243,513.0156 L2323.4243,447.6094 L2313.4243,437.6094 L2142,437.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2313.4243,437.6094 L2313.4243,447.6094 L2323.4243,447.6094 L2313.4243,437.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.4243" x="2148" y="456.1045">VisionPipelineResult keeps:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.6816" x="2148" y="472.4561">- output VisionNode list</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.2598" x="2148" y="488.8076">- BoundingBox projection</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.188" x="2148" y="505.1592">- per-stage trace metadata</text></g><g class="entity" data-qualified-name="GMN73" data-source-line="103" id="ent0074"><path d="M1196,44.6094 L1196,120.0156 L1487.9688,120.0156 L1487.9688,54.6094 L1477.9688,44.6094 L1196,44.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1477.9688,44.6094 L1477.9688,54.6094 L1487.9688,54.6094 L1477.9688,44.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.9688" x="1202" y="63.1045">Registry-bundle factories are resolved once via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.207" x="1202" y="79.4561">_resolve_pipeline_builders().</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.0532" x="1202" y="95.8076">Stage configs are coerced together through</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0952" x="1202" y="112.1592">_coerce_pipeline_stages().</text></g><g class="entity" data-qualified-name="GMN76" data-source-line="110" id="ent0077"><path d="M312,60.6094 L312,119.6641 A0,0 0 0 0 312,119.6641 L450,119.6641 L454,209.5494 L458,119.6641 L596.0532,119.6641 A0,0 0 0 0 596.0532,119.6641 L596.0532,70.6094 L586.0532,60.6094 L312,60.6094 A0,0 0 0 0 312,60.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M586.0532,60.6094 L586.0532,70.6094 L596.0532,70.6094 L586.0532,60.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.1987" x="318" y="79.1045">Plugin installation is now driven by a shared</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.0532" x="318" y="95.4561">binding table plus scoped registries instead of</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.165" x="318" y="111.8076">repeating one registration path per capability.</text></g><!--reverse link Bundle to DetectorRegistry--><g class="link" data-entity-1="ent0005" data-entity-2="ent0006" data-link-type="composition" data-source-line="25" id="lnk16"><path d="M956.3664,606.3583 C968.8564,604.4083 969.84,604.4594 982,603.1094 C1002.35,600.8494 1151.18,607.2394 1166,593.1094 C1213.37,547.9494 1153.1,349.5394 1196,300.1094 C1216.57,276.4094 1250.09,267.0694 1279.72,263.8094" fill="none" id="Bundle-backto-DetectorRegistry" 