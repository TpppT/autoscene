="GMN73" data-source-line="96" id="ent0074"><path d="M412,1526.1094 L412,1634.2188 A0,0 0 0 0 412,1634.2188 L729.9624,1634.2188 A0,0 0 0 0 729.9624,1634.2188 L729.9624,1536.1094 L719.9624,1526.1094 L575,1526.1094 L571,1491.3594 L567,1526.1094 L412,1526.1094 A0,0 0 0 0 412,1526.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M719.9624,1526.1094 L719.9624,1536.1094 L729.9624,1536.1094 L719.9624,1526.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.9624" x="418" y="1544.6045">RuntimeContextFactory now coordinates assembly,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.418" x="418" y="1560.9561">but does not directly own:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.7998" x="418" y="1577.3076">- required factory validation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.5825" x="418" y="1593.6592">- named resource construction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.1689" x="418" y="1610.0107">- policy / service resolution</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.9434" x="418" y="1626.3623">- signature-based factory invocation</text></g><g class="entity" data-qualified-name="GMN76" data-source-line="105" id="ent0077"><path d="M986,267.1094 L986,375.2188 A0,0 0 0 0 986,375.2188 L1237.5151,375.2188 A0,0 0 0 0 1237.5151,375.2188 L1237.5151,277.1094 L1227.5151,267.1094 L1116,267.1094 L1112,232.3594 L1108,267.1094 L986,267.1094 A0,0 0 0 0 986,267.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1227.5151,267.1094 L1227.5151,277.1094 L1237.5151,277.1094 L1227.5151,267.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5151" x="992" y="285.6045">This step happens before TestExecutor.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.2388" x="992" y="301.9561">Defaults are selected once through:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.979" x="992" y="318.3076">- _resolve_factory()</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.2998" x="992" y="334.6592">- _factory_accepts_plugins()</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.0488" x="992" y="351.0107">The executor receives a profile that is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.7407" x="992" y="367.3623">already executable.</text></g><g class="entity" data-qualified-name="GMN79" data-source-line="114" id="ent0080"><path d="M1469,44.6094 L1469,103.6641 L1800.6797,103.6641 L1800.6797,54.6094 L1790.6797,44.6094 L1469,44.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1790.6797,44.6094 L1790.6797,54.6094 L1800.6797,54.6094 L1790.6797,44.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.8906" x="1475" y="63.1045">Required runtime factories are checked</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.6797" x="1475" y="79.4561">through the shared _REQUIRED_FACTORY_FIELDS</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.4541" x="1475" y="95.8076">declaration instead of repeated inline guards.</text></g><g class="entity" data-qualified-name="GMN82" data-source-line="120" id="ent0083"><path d="M972,854.6094 L972,913.6641 A0,0 0 0 0 972,913.6641 L1252.4033,913.6641 A0,0 0 0 0 1252.4033,913.6641 L1252.4033,864.6094 L1242.4033,854.6094 L1116,854.6094 L1112,819.2494 L1108,854.6094 L972,854.6094 A0,0 0 0 0 972,854.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1242.4033,854.6094 L1242.4033,864.6094 L1252.4033,864.6094 L1242.4033,854.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.9224" x="978" y="873.1045">Shared helper _build_named_resources()</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.4033" x="978" y="889.4561">now creates detectors / readers / log sources</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.7915" x="978" y="905.8076">with one consistent construction path.</text></g><g class="entity" data-qualified-name="GMN85" data-source-line="126" id="ent0086"><path d="M1001,1526.6094 L1001,1602.0156 A0,0 0 0 0 1001,1602.0156 L1222.8652,1602.0156 A0,0 0 0 0 1222.8652,1602.0156 L1222.8652,1536.6094 L1212.8652,1526.6094 L1116,1526.6094 L1112,1491.1794 L1108,1526.6094 L1001,1526.6094 A0,0 0 0 0 1001,1526.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1212.8652,1526.6094 L1212.8652,1536.6094 L1222.8652,1536.6094 L1212.8652,1526.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.7471" x="1007" y="1545.1045">Shared helpers normalize:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9243" x="1007" y="1561.4561">- _resolve_profile_component()</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.5845" x="1007" y="1577.8076">- _resolve_registry()</tex