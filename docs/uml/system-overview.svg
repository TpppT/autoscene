ation lives in runtime_compile.py</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5952" x="1287" y="545.6876">- runtime assembly lives in runtime_assembly.py</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.8506" x="1287" y="562.0392">- execution flow lives in runtime_execution.py</text></g><g class="entity" data-qualified-name="GMN115" data-source-line="155" id="ent0116"><path d="M542,751.4894 L542,810.5441 L815.1606,810.5441 L815.1606,761.4894 L805.1606,751.4894 L542,751.4894" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M805.1606,751.4894 L805.1606,761.4894 L815.1606,761.4894 L805.1606,751.4894" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.1606" x="548" y="769.9845">RuntimeProfileResolver normalizes defaults</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.9688" x="548" y="786.3361">and binds plugin-aware factories once</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.4834" x="548" y="802.6876">before TestExecutor is constructed.</text></g><g class="entity" data-qualified-name="GMN118" data-source-line="161" id="ent0119"><path d="M3583.5,256.4894 L3583.5,331.8956 A0,0 0 0 0 3583.5,331.8956 L3679.5,331.8956 L3683.5,384.2794 L3687.5,331.8956 L3783.707,331.8956 A0,0 0 0 0 3783.707,331.8956 L3783.707,266.4894 L3773.707,256.4894 L3583.5,256.4894 A0,0 0 0 0 3583.5,256.4894" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3773.707,256.4894 L3773.707,266.4894 L3783.707,266.4894 L3773.707,256.4894" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.207" x="3589.5" y="274.9845">Shared helpers now 