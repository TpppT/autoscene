.5" style="stroke:#181818;stroke-width:0.5;" width="76.0342" x="46" y="471.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56.0342" x="56" y="495.6426">capture/*</text></g><!--entity Runner--><g class="entity" data-qualified-name="Primary Consumers.Runner" data-source-line="17" id="ent0009"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="69.8066" x="49" y="398.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="49.8066" x="59" y="422.6426">runner/*</text></g><!--entity Vision--><g class="entity" data-qualified-name="Primary Consumers.Vision" data-source-line="18" id="ent0010"><rect fill="#F1F1F1" height="37.6094" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="65.1309" x="51.5" y="179.1094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="45.1309" x="61.5" y="203.6426">vision/*</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="32" id="ent0021"><path d="M236,44.6094 L236,103.6641 L517.8506,103.6641 L517.8506,54.6094 L507.8506,44.6094 L236,44.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M507.8506,44.6094 L507.8506,54.6094 L517.8506,54.6094 L507.8506,44.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.8506" x="242" y="63.1045">The core module is the shared contract layer.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.0996" x="242" y="79.4561">It keeps the reusable data models that the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253.6143" x="242" y="95.8076">rest of the framework exchanges at runtime.</text></g><g class="entity" data-qualified-name="GMN23" data-source-li