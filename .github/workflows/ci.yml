name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q

      - name: Run zero-setup smoke example
        shell: pwsh
        run: |
          python .\run_tests.py .\examples\mock_case.yaml --output-dir .\ci_outputs
          if (-not (Test-Path .\ci_outputs\mock_case.log)) {
            throw "Expected smoke log artifact was not created."
          }
          if (-not (Test-Path .\ci_outputs\mock_frame.png)) {
            throw "Expected smoke screenshot artifact was not created."
          }

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts-py${{ matrix.python-version }}
          path: ci_outputs
          if-no-files-found: ignore
